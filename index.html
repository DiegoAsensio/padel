<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranking — Americano de Pádel</title>
  <meta name="description" content="Ranking Elo del grupo de pádel: posiciones, estadísticas y forma reciente de cada jugador." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="/assets/images/favicon.png" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand"><span class="brand-mark">●</span> Ranking Americano</a>
      <button class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="main-nav" aria-label="Abrir menú">
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
      </button>
      <nav class="main-nav" id="main-nav" aria-label="Navegación principal">
        <a href="index.html" aria-current="page">Ranking</a>
        <a href="historial.html">Historial</a>
        <a href="cargar.html">Cargar Partido</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="page-header">
        <span class="eyebrow">Elo dinámico · 7 jugadores</span>
        <h1>Tabla de posiciones</h1>
      </div>

      <div class="table-scroll">
        <table class="ranking-table">
          <colgroup>
            <col class="col-pos" />
            <col class="col-jugador" />
            <col class="col-elo" />
            <col class="col-pj" />
            <col class="col-pg" />
            <col class="col-pp" />
            <col class="col-pe" />
            <col class="col-pctv" />
            <col class="col-pctg" />
            <col class="col-forma" />
          </colgroup>
          <thead>
            <tr>
              <th>Pos</th>
              <th>Jugador</th>
              <th data-criterio="elo" tabindex="0" role="button" aria-sort="descending">Elo</th>
              <th data-criterio="partidos" tabindex="0" role="button" aria-sort="none">PJ</th>
              <th data-criterio="victorias" tabindex="0" role="button" aria-sort="none">PG</th>
              <th data-criterio="derrotas" tabindex="0" role="button" aria-sort="none">PP</th>
              <th data-criterio="empates" tabindex="0" role="button" aria-sort="none">PE</th>
              <th data-criterio="pctVictorias" tabindex="0" role="button" aria-sort="none">% Victorias</th>
              <th data-criterio="pctGames" tabindex="0" role="button" aria-sort="none">% Games</th>
              <th>Forma</th>
            </tr>
          </thead>
          <tbody id="ranking-body">
            <tr><td colspan="10" class="empty-state">Cargando ranking…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="js/nav.js"></script>
  <script src="js/data.js"></script>
  <script src="js/elo.js"></script>
  <script src="js/partidos.js"></script>
  <script src="js/ranking.js"></script>
</body>
</html>
